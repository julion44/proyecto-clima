<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App del Clima</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <span>🌤️ App del Clima</span>
        <div>
            <span id="nombre-usuario"></span>
            <button class="btn-perfil" onclick="window.location.href='perfil.html'">Editar Perfil</button>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="contenedor">

        <div class="buscador">
            <input type="text" id="inputCiudad" placeholder="Escribe una ciudad...">
            <button onclick="buscarClima()">Buscar</button>
        </div>

        <div class="resultado" id="resultado">
            <p class="ciudad-nombre" id="nombreCiudad"></p>
            <p class="temperatura" id="temperatura"></p>
            <p class="descripcion" id="descripcion"></p>
            <p class="detalle" id="humedad"></p>
            <p class="detalle" id="viento"></p>
        </div>

        <div class="error" id="error"></div>

        <div class="historial-seccion">
            <h2>📋 Historial de búsquedas</h2>
            <table id="tabla-historial">
                <thead>
                    <tr>
                        <th>Ciudad</th>
                        <th>Temperatura</th>
                        <th>Descripción</th>
                        <th>Humedad</th>
                        <th>Fecha</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-historial"></tbody>
            </table>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
