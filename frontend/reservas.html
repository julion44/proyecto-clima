<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <span>🌤️ App del Clima</span>
        <div>
            <span id="nombre-usuario"></span>
            <button class="btn-perfil" onclick="window.location.href='home.html'">Volver</button>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="contenedor">

        <div class="historial-seccion">
            <h2>🎵 Eventos Disponibles</h2>
            <table>
                <thead>
                    <tr>
                        <th>Evento</th>
                        <th>Organizador</th>
                        <th>Ciudad</th>
                        <th>Fecha</th>
                        <th>Temperatura</th>
                        <th>Clima</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-eventos-disponibles"></tbody>
            </table>
        </div>

        <div class="historial-seccion" style="margin-top: 30px;">
            <h2>📋 Mis Reservas</h2>
            <table>
                <thead>
                    <tr>
                        <th>Evento</th>
                        <th>Organizador</th>
                        <th>Ciudad</th>
                        <th>Fecha</th>
                        <th>Temperatura</th>
                        <th>Clima</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-reservas"></tbody>
            </table>
        </div>

        <p class="mensaje-perfil" id="msg-reserva"></p>

    </div>

    <script src="reservas.js"></script>
</body>
</html>
